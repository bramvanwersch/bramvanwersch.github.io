<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>development</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="static/develop_style.css"/>
</head>
<body>
    <!-- Side navigation -->
    <div class="sidenav">
        <div class="container-fluid doodle-border">
            <div class="two_column">
                <div class="column_item" style="color:white;">Background:</div>
                <button id="new_platform_button">New platform</button>
            </div>
            <div class="two_column">
                <select id="background_select" class="column_item"></select>
            </div>
        </div>
        <div id="selected_widget_group" style="visibility:hidden;">
            <hr class="solid column_item" style="margin-top:200px; margin-right:10px">
            <div style="color:white;">Selected Platform info:</div>
            <hr class="solid column_item" style="margin-top:20px; margin-right:10px">
            <div class="container-fluid">
                <div class="two_column_imbalanced2">
                    <div class="column_item" style="color:white;">Width:</div>
                    <div class="column_item" style="color:white;">Heigth:</div>
                </div>
                <div class="two_column_imbalanced1">
                    <input style="margin-bottom:10px;" type="number" id="selected_width" name="quantity" min="50" step="50" width="10">
                    <input style="margin-bottom:10px;" type="number" id="selected_height" name="quantity" min="50" step="50" width="10">
                </div>
            </div>
            <button id="selected_platform_submit" class="center">Change</button>
        </div>
    </div>
    <div id="main">
        <canvas id="canvas" ></canvas>
    </div>

</body>
    <script type = "module" src = "scripts/develop_functions.js" ></script>
</html>
